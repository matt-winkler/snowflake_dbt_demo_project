
models:
  - name: check_source_configs
    columns:
      - name: source_identifier
        tests:
          - unique
      - name: source_database
      - name: source_schema
      - name: source_package_name
        tests:
          - accepted_values:
              config:
                severity: "{{'warn' if target.name != 'ci' else 'error'}}"
              values:
                - "test_should_fail"